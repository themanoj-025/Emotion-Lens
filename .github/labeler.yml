# Auto-label PRs based on changed paths
# See: https://github.com/actions/labeler

python:
  - changed-files:
      - any-glob-to-any-file: ['*.py', 'utils/*.py', 'pages/*.py']

streamlit:
  - changed-files:
      - any-glob-to-any-file: ['streamlit_app.py', '.streamlit/**']

api:
  - changed-files:
      - any-glob-to-any-file: ['api_server.py']

ci:
  - changed-files:
      - any-glob-to-any-file: ['.github/**']

documentation:
  - changed-files:
      - any-glob-to-any-file: ['*.md', 'docs/**']
